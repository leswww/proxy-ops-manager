# =====================================================
# ProxyOps Manager Docker Compose 示例
#
# 推荐方式：直接运行一键安装脚本，它会自动生成
# 包含随机凭据的 docker-compose.yml：
#
#   sudo bash install.sh
#
# 手动方式：
#   cp docker-compose.example.yml docker-compose.yml
#   # 修改其中的随机密码/密钥
#   docker compose up -d --build
#
# 查看首次启动生成的管理员临时密码：
#   docker compose exec app cat /app/data/initial-credentials.txt
# =====================================================

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    command: ["--default-authentication-plugin=mysql_native_password"]
    environment:
      MYSQL_ROOT_PASSWORD: change_me_root
      MYSQL_DATABASE: proxy_ops_manager
      MYSQL_USER: ipops_user
      MYSQL_PASSWORD: change_me
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 30

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3010"
      DATABASE_URL: "mysql://ipops_user:change_me@db:3306/proxy_ops_manager"
      ADMIN_USERNAME: "admin"
      # 留空 -> 首次启动自动生成随机密码 (见 /app/data/initial-credentials.txt)
      ADMIN_PASSWORD_HASH: ""
      SESSION_SECRET: "change_me_random_secret_at_least_32_chars"
      # HTTP/IP 测试保持 "false"；HTTPS/域名生产改为 "true"
      COOKIE_SECURE: "false"
      USE_MOCK_DATA: "false"
      NEXT_PUBLIC_APP_NAME: "ProxyOps Manager"
      NEXT_PUBLIC_APP_DOMAIN: "your-domain.com"
    ports:
      - "3010:3010"
    volumes:
      - app_data:/app/data

volumes:
  db_data:
  app_data:
